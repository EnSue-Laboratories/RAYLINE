name: Package Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to upload built binaries to
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            platform: windows
            binary_glob: "*.exe"
          - os: macos-latest
            label: macOS
            platform: macos
            binary_glob: "*.dmg"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      # Pre-create the GitHub release so electron-builder can publish assets to it.
      # If the release already exists (e.g. re-triggered CI), the || true suppresses the error.
      - name: Create GitHub release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release for $TAG" \
            || true

      - name: Package Windows app
        if: matrix.platform == 'windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            PUBLISH_FLAG="always"
          else
            PUBLISH_FLAG="never"
          fi
          npx electron-builder --config electron-builder.config.cjs --win \
            --publish "$PUBLISH_FLAG" \
            --config.npmRebuild=false

      - name: Package macOS app
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --config electron-builder.config.cjs --mac --publish never

      - name: Collect packaged files
        shell: bash
        run: |
          rm -rf artifact
          mkdir -p artifact
          while IFS= read -r -d '' file; do
            cp "$file" artifact/
          done < <(find release -maxdepth 1 -type f -name '${{ matrix.binary_glob }}' -print0)
          count=$(find artifact -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            echo "No packaged binaries matching ${{ matrix.binary_glob }} were found in release/"
            exit 1
          fi
          find artifact -maxdepth 1 -type f -print

      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rayline-${{ matrix.platform }}
          path: artifact/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload assets to GitHub release (workflow_dispatch with tag)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find artifact -maxdepth 1 -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No binary files found in artifact/"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber

      - name: Upload assets to GitHub release (release event)
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find artifact -maxdepth 1 -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No binary files found in artifact/"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
