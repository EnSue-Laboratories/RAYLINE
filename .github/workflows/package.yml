name: Package Desktop App

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            platform: windows
          - os: macos-latest
            label: macOS
            platform: macos

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows app
        if: matrix.platform == 'windows'
        run: npx electron-builder --win --publish never --config.npmRebuild=false

      - name: Package macOS app
        if: matrix.platform == 'macos'
        run: npx electron-builder --mac --publish never

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rayline-${{ matrix.platform }}
          path: release/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload assets to GitHub release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mapfile -d '' files < <(find release -maxdepth 1 -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found in release/"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
